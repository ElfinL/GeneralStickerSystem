<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f14;
      color: rgba(255,255,255,0.9);
    }
    
    .header {
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(28,30,36,1), rgba(16,18,22,1));
      color: rgba(255,255,255,0.92);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: 190px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .header-subtitle {
      font-size: 11px;
      opacity: 0.9;
    }

    .header-author {
      font-size: 10px;
      opacity: 0.8;
    }

    .header-author a {
      color: #4a90e2;
      text-decoration: none;
    }

    .header-author a:hover {
      text-decoration: underline;
    }

    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .lang-toggle {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(10,12,16,0.85);
      color: rgba(255,255,255,0.9);
      font-size: 10px;
      cursor: pointer;
    }

    .lang-toggle:hover {
      background: rgba(120,190,255,0.18);
      border-color: rgba(120,190,255,0.55);
    }
    
    .config-section {
      padding: 15px;
      background: rgba(16,18,22,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .config-section input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 12px;
    }

    .config-section textarea {
      width: 100%;
      min-height: 92px;
      padding: 8px;
      margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.35;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      background: rgba(10,12,16,0.95);
      color: rgba(255,255,255,0.92);
    }
    .config-section textarea::placeholder { color: rgba(255,255,255,0.35); }
    
    .config-section button {
      width: 100%;
      padding: 8px;
      background: #1f7aec;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 5px;
    }
    
    .config-section button:hover {
      background: #1a68c9;
    }
    
    .config-status {
      font-size: 11px;
      color: #28a745;
      margin-top: 5px;
      text-align: center;
    }
    
    .sticker-container {
      padding: 15px;
      background: rgba(12,14,18,0.98);
    }
    
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
      max-height: 180px; /* 約兩行 */
      overflow-y: auto;
      padding-right: 2px;
    }
    
    .sticker-item {
      background: rgba(255,255,255,0.06);
      border: 0;
      border-radius: 8px;
      padding: 8px 5px;
      cursor: default;
      transition: all 0.2s;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      position: relative;
    }
    
    .sticker-item:hover {
      background: rgba(120,190,255,0.14);
      transform: translateY(-1px);
    }
    
    .sticker-actions {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      pointer-events: auto;
    }
    
    .sticker-actions button {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(10,12,16,0.85);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
    }
    
    .sticker-actions button:hover {
      background: rgba(120,190,255,0.18);
      border-color: rgba(120,190,255,0.45);
    }
    
    .sticker-actions button.fav.on {
      color: #ffd43b;
      border-color: rgba(255,212,59,0.55);
    }

    .sticker-id {
      font-size: 9px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      line-height: 1.3;
      word-break: break-all;
      text-align: center;
    }
    
    .sticker-code {
      font-size: 9px;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .add-section {
      border-top: 1px solid #e9ecef;
      padding-top: 12px;
    }
    
    .add-btn {
      width: 100%;
      padding: 8px;
      background: #f1f3f5;
      border: 1px dashed #adb5bd;
      border-radius: 6px;
      color: #495057;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .add-btn:hover {
      background: #e9ecef;
      border-color: #4a90e2;
      color: #4a90e2;
    }
    
    .footer {
      padding: 10px;
      background: rgba(16,18,22,0.98);
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-title" id="titleText">🎨 DLive Sticker Quick V1.5</div>
      <div class="header-subtitle" id="subtitleText">貼圖清單管理</div>
      <div class="header-author">
        by <a href="https://github.com/ElfinL" target="_blank" rel="noopener noreferrer">Elfin</a>
      </div>
    </div>
    <div class="header-right">
      <button id="langToggle" class="lang-toggle">中 / EN</button>
    </div>
  </div>
  
  <div class="config-section">
    <div id="configTitle" style="font-size: 12px; color: #ced4da; font-weight: 600;">
      貼圖 ID 設定
    </div>
    <div id="configHint" style="font-size: 11px; color: #868e96; margin-top: 5px;">
      一行一個 ID，儲存後會自動列出圖片
    </div>
    <textarea id="idListInput" placeholder="826c4ac1e004273_498281&#10;826cd8c8b004273_335245"></textarea>
    <button id="saveIdsBtn">儲存 ID 清單</button>
    <div class="config-status" id="configStatus" style="margin-top:0px;"></div>
    <div id="reminderText" style="font-size: 11px; color: #4a90e2; margin-top: 5px;">
      提醒：需要先在 DLive 登入；並在頻道頁使用
    </div>
  </div>
  
  <div class="sticker-container">
    <div class="sticker-grid" id="stickerGrid"></div>
  </div>
  
  <div class="footer" id="footerText">
    🔥 點「★」設常用 • 點「✕」刪除
  </div>

  <script src="popup.js"></script>
</body>
</html>
